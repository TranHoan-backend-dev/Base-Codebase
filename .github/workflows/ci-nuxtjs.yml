# =============================================================================
# CI Workflow – nuxtjs-base (Nuxt 4 / Vue 3 / TypeScript / pnpm)
#
# Trigger:
#   - Push lên branch: main, develop, release/**
#   - Pull Request nhắm vào: main, develop
#
# Jobs:
#   lint       → ESLint check
#   typecheck  → nuxt typecheck (vue-tsc)
#   build      → nuxt build
#
# Lưu ý: pnpm@11.6.0 yêu cầu Node.js >= 22.13
# =============================================================================

name: CI – Nuxt.js Base

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
    paths:
      - "nuxtjs-base/**"
      - ".github/workflows/ci-nuxtjs.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "nuxtjs-base/**"
      - ".github/workflows/ci-nuxtjs.yml"

defaults:
  run:
    working-directory: nuxtjs-base

env:
  NODE_VERSION: "22" # pnpm@11.6.0 requires Node >= 22.13
  PNPM_VERSION: "11.6.0"

# ---------------------------------------------------------------------------
# Reusable anchor cho pnpm setup (dùng lại ở mọi job)
# ---------------------------------------------------------------------------
jobs:
  # ---------------------------------------------------------------------------
  # Job: lint – ESLint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-nuxtjs-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-nuxtjs-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run ESLint
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # Job: typecheck – vue-tsc via nuxt typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-nuxtjs-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-nuxtjs-${{ runner.os }}-

      # Cache .nuxt/ (generated types từ nuxt prepare)
      - name: Cache Nuxt generated types
        uses: actions/cache@v4
        with:
          path: nuxtjs-base/.nuxt
          key: nuxt-types-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-${{ hashFiles('nuxtjs-base/nuxt.config.ts') }}
          restore-keys: |
            nuxt-types-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-
            nuxt-types-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Prepare Nuxt (generate types)
        run: pnpm postinstall

      - name: Type check
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Job: build – nuxt build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-nuxtjs-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-nuxtjs-${{ runner.os }}-

      # Cache .nuxt/ để tránh chạy lại nuxt prepare
      - name: Cache Nuxt generated types
        uses: actions/cache@v4
        with:
          path: nuxtjs-base/.nuxt
          key: nuxt-types-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-${{ hashFiles('nuxtjs-base/nuxt.config.ts') }}
          restore-keys: |
            nuxt-types-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-
            nuxt-types-${{ runner.os }}-

      # Cache .output/ từ build trước (incremental)
      - name: Cache Nuxt build output
        uses: actions/cache@v4
        with:
          path: nuxtjs-base/.output
          key: nuxt-output-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-${{ hashFiles('nuxtjs-base/app/**/*.vue', 'nuxtjs-base/app/**/*.ts', 'nuxtjs-base/nuxt.config.ts') }}
          restore-keys: |
            nuxt-output-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-
            nuxt-output-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build
        run: pnpm build
        env:
          NUXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        with:
          name: nuxtjs-build-${{ github.ref_name }}-${{ github.sha }}
          path: nuxtjs-base/.output/
          retention-days: 7
