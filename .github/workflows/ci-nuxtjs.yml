# =============================================================================
# CI Workflow – nuxtjs-base (Nuxt 4 / Vue 3 / TypeScript / pnpm)
#
# Trigger:
#   - Push lên branch: main, develop, release/**
#   - Pull Request nhắm vào: main, develop
#
# Jobs:
#   lint       → ESLint check
#   typecheck  → nuxt typecheck (vue-tsc)
#   build      → nuxt build
# =============================================================================

name: CI – Nuxt.js Base

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
    paths:
      - "nuxtjs-base/**"
      - ".github/workflows/ci-nuxtjs.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "nuxtjs-base/**"
      - ".github/workflows/ci-nuxtjs.yml"

defaults:
  run:
    working-directory: nuxtjs-base

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "11.6.0"

jobs:
  # ---------------------------------------------------------------------------
  # Job: lint – ESLint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: nuxtjs-base/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # Job: typecheck – vue-tsc via nuxt typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: nuxtjs-base/pnpm-lock.yaml

      # Cache .nuxt/tsconfig.json và generated types
      - name: Cache Nuxt prepare output
        uses: actions/cache@v4
        with:
          path: nuxtjs-base/.nuxt
          key: nuxt-prepare-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt (generate types)
        run: pnpm postinstall

      - name: Type check
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Job: build – nuxt build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: nuxtjs-base/pnpm-lock.yaml

      - name: Cache Nuxt build
        uses: actions/cache@v4
        with:
          path: |
            nuxtjs-base/.nuxt
            nuxtjs-base/.output
          key: nuxt-build-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-${{ hashFiles('nuxtjs-base/**/*.vue', 'nuxtjs-base/**/*.ts', 'nuxtjs-base/nuxt.config.ts') }}
          restore-keys: |
            nuxt-build-${{ runner.os }}-${{ hashFiles('nuxtjs-base/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Tắt Nuxt telemetry trong CI
          NUXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        with:
          name: nuxtjs-build-${{ github.ref_name }}-${{ github.sha }}
          path: nuxtjs-base/.output/
          retention-days: 7
