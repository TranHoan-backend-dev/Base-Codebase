# =============================================================================
# CI Workflow – BaseBackend (Spring Boot Library / Gradle / Java 21)
#
# Trigger:
#   - Push lên branch: main, develop, release/**
#   - Pull Request nhắm vào: main, develop
#
# Lưu ý: BaseBackend là LIBRARY project (không có main class).
#   - Dùng task `jar` thay vì `bootJar`.
#
# Jobs:
#   build  → compile + test + package JAR
# =============================================================================

name: CI – BaseBackend

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
    paths:
      - "BaseBackend/**"
      - ".github/workflows/ci-base-backend.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "BaseBackend/**"
      - ".github/workflows/ci-base-backend.yml"

defaults:
  run:
    working-directory: BaseBackend

env:
  JAVA_VERSION: "21"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # ---------------------------------------------------------------------------
  # Job: build – Compile, Test, Package
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java 21 (Temurin distribution – OpenJDK)
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # 3. Cache Gradle wrapper
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('BaseBackend/gradle/wrapper/gradle-wrapper.properties') }}

      # 4. Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-deps-${{ runner.os }}-${{ hashFiles('BaseBackend/**/*.gradle*', 'BaseBackend/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-deps-${{ runner.os }}-

      # 5. Cache build output (incremental compilation)
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: BaseBackend/build
          key: gradle-build-${{ runner.os }}-${{ hashFiles('BaseBackend/src/**', 'BaseBackend/**/*.gradle*') }}
          restore-keys: |
            gradle-build-${{ runner.os }}-

      # 6. Grant execute permission cho gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7. Compile
      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      # 8. Run tests
      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_DATASOURCE_BUSINESS_URL: "jdbc:h2:mem:testdb_business;DB_CLOSE_DELAY=-1"
          SPRING_DATASOURCE_SYSTEM_URL: "jdbc:h2:mem:testdb_system;DB_CLOSE_DELAY=-1"
          SPRING_REDIS_HOST: "localhost"
          SPRING_REDIS_PORT: "6379"
          SPRING_ELASTICSEARCH_URIS: "http://localhost:9200"

      # 9. Publish Test Report (luôn chạy dù test fail)
      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: BaseBackend/build/reports/tests/test/
          retention-days: 7

      # 10. Package JAR (library → dùng `jar`, không dùng `bootJar`)
      #     bootJar yêu cầu main class — BaseBackend là library nên không có.
      - name: Package JAR
        run: ./gradlew jar --no-daemon -x test

      # 11. Upload JAR artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        with:
          name: base-backend-${{ github.ref_name }}-${{ github.sha }}
          path: BaseBackend/build/libs/*.jar
          retention-days: 14
