# =============================================================================
# CI Workflow – nextjs-base (Next.js 16 / React 19 / TypeScript / pnpm)
#
# Trigger:
#   - Push lên branch: main, develop, release/**
#   - Pull Request nhắm vào: main, develop
#
# Jobs:
#   lint   → ESLint check
#   build  → next build (TypeScript check ngầm định + bundle)
#
# Lưu ý: pnpm@11.6.0 yêu cầu Node.js >= 22.13
# =============================================================================

name: CI – Next.js Base

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
    paths:
      - "nextjs-base/**"
      - ".github/workflows/ci-nextjs.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "nextjs-base/**"
      - ".github/workflows/ci-nextjs.yml"

defaults:
  run:
    working-directory: nextjs-base

env:
  NODE_VERSION: "22" # pnpm@11.6.0 requires Node >= 22.13
  PNPM_VERSION: "11.6.0"

jobs:
  # ---------------------------------------------------------------------------
  # Job: lint – ESLint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      # Cache pnpm store toàn cục (shared giữa lint + build)
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-nextjs-${{ runner.os }}-${{ hashFiles('nextjs-base/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run ESLint
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # Job: build – next build (TypeScript check + bundle)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm ${{ env.PNPM_VERSION }}
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      # Cache pnpm store toàn cục
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-nextjs-${{ runner.os }}-${{ hashFiles('nextjs-base/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-nextjs-${{ runner.os }}-

      # Cache .next/cache để tăng tốc incremental build
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: nextjs-base/.next/cache
          key: nextjs-build-${{ runner.os }}-${{ hashFiles('nextjs-base/pnpm-lock.yaml') }}-${{ hashFiles('nextjs-base/src/**/*.ts', 'nextjs-base/src/**/*.tsx', 'nextjs-base/app/**/*.ts', 'nextjs-base/app/**/*.tsx') }}
          restore-keys: |
            nextjs-build-${{ runner.os }}-${{ hashFiles('nextjs-base/pnpm-lock.yaml') }}-
            nextjs-build-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        with:
          name: nextjs-build-${{ github.ref_name }}-${{ github.sha }}
          path: |
            nextjs-base/.next/
            !nextjs-base/.next/cache
          retention-days: 7
