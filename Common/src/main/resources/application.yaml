spring:
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${SPRING_ELASTICSEARCH_USERNAME:elastic}
    password: ${SPRING_ELASTICSEARCH_PASSWORD:password}
  application:
    name: Common
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
    use-code-as-default-message: true
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    locale: vi_VN
  jpa:
    # hibernate:
    # ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # ddl-auto được cấu hình riêng trong từng JpaConfig class
  # =========================================================================
  # Dual Datasource Configuration
  # - business: chứa các entity nghiệp vụ (BaseModel) của từng service
  # - system:   chứa các entity kỹ thuật (OutboxEvent, SystemSetting, DynamicGridConfig,...)
  # =========================================================================
  datasource:
    business:
      url: ${SPRING_DATASOURCE_BUSINESS_URL:jdbc:postgresql://localhost:5432/db_business}
      username: ${SPRING_DATASOURCE_BUSINESS_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_BUSINESS_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: BusinessHikariPool
        maximum-pool-size: 10
        minimum-idle: 3
        connection-timeout: 2000
        max-lifetime: 600000
        idle-timeout: 30000
    system:
      url: ${SPRING_DATASOURCE_SYSTEM_URL:jdbc:postgresql://localhost:5432/db_system}
      username: ${SPRING_DATASOURCE_SYSTEM_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_SYSTEM_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: SystemHikariPool
        maximum-pool-size: 5
        minimum-idle: 2
        connection-timeout: 2000
        max-lifetime: 600000
        idle-timeout: 30000
  web:
    locale-resolver: accept_header
    locale: en_US
rabbit-mq-config:
  exchange_name: event_exchange
management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
server:
  port: ${PORT:9003}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api/v1}
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
web-frontend-url: ${WEB_FRONTEND_URL}
cors:
  allowed-origins:
    - ${web-frontend-url}
security:
  public-urls:
    - /api/v1/public/**
springdoc:
  api-docs:
    enabled: true
    path: ${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    enabled: true
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui/index.html}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5000ms
        failureRateThreshold: 50
        slowCallDurationThreshold: 2000ms
        slowCallRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      default:
        baseConfig: default
  ratelimiter:
    configs:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0ms
    instances:
      default:
        baseConfig: default
